<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Journal AI - Access Portal</title>
    <link rel="stylesheet" href="./public/css/login.css">
</head>
<body>
    <div class="animated-bg"></div>

    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">Mood Journal AI</h1>
            <p class="login-subtitle">Access Portal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="accessCode" class="form-label">Access Code</label>
                <input
                    type="password"
                    id="accessCode"
                    class="form-input"
                    placeholder="Enter your access code"
                    autocomplete="off"
                    required
                />
                <div id="errorMessage" class="error-message"></div>
            </div>

            <button type="submit" class="access-btn" id="submitBtn">
                Unlock Access
            </button>
        </form>

        <p class="info-text">
            Enter the access code to begin your mood journaling experience.
        </p>
    </div>

    <script src="./public/js/login.js"></script>
</body>
</html>
